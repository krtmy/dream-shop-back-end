spring.application.name=dreamshops-back-end

spring.datasource.url=jdbc:mysql://localhost:3306/shopcart_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

##(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update

logging.level.root=info
#logging.level.org.springframework=debug

product-api.prefix=/api/v1/products
category-api.prefix=/api/v1/categories
image-api.prefix=/api/v1/images
cart-api.prefix=/api/v1/carts
cartItem-api.prefix=/api/v1/cartItems
order-api.prefix=/api/v1/orders
user-api.prefix=/api/v1/users
auth-api.prefix=/api/v1/auth

#photo size
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.file-size-threshold=50MB


#jwt
auth.token.expirationInMils=3600000
auth.token.jwtSecret=${JWT_TOKEN}